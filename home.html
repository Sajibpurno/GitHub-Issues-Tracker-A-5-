<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- navbar -->
    <header>
        <div class="navbar bg-white shadow-sm px-4 lg:px-20 border-b border-gray-100 sticky top-0 z-50">
            <div class="flex-1">
                <div class="flex items-center gap-3">
                    <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="Logo" class="w-10 h-10">
                    <a class="md:text-2xl text-[20px] font-bold tracking-tighter text-gray-800">GitHub Issues Tracker</a>
                </div>
            </div>
            <div class="flex gap-4">
                <div class="form-control flex-row gap-3">

                    <input type="text" id="input-search" placeholder="Search issues..." class="input input-bordered w-38 md:w-96 h-12 bg-gray-50 border-gray-200 focus:bg-white transition-all duration-200" />

                    <button id="btn-search" class="btn btn-primary py-6 md:px-6 px-3 bg-indigo-600 border-none hover:bg-indigo-700 text-white font-bold shadow-md">+ New Issue</button>
                </div>
    
                <button id="logOut" onclick="logout()" class="btn btn-ghost btn-circle border-2 border-gray-300 hover:border-red-500 text-gray-400 hover:text-red-500 transition-all duration-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- main part -->
     <main class=" container mx-auto">
<!-- button part -->
        <div class="bg-white rounded-lg shadow-sm border border-gray-100 mb-4 inline-flex gap-2 w-full py-4 mt-15 pl-4">
            <button id="all-btn" onclick="toggleBtn('all-btn')" class="border-gray-300 btn btn-ghost btn-lg bg-[#4A00FF] text-gray-500 px-10 h-14 rounded-xl font-bold">All</button>
            <button id="open-btn" onclick="toggleBtn('open-btn')" class="btn btn btn-ghost btn-lg text-gray-500 px-10 h-14 rounded-xl font-bold border-gray-300">Open</button>
            <button id="close-btn" onclick="toggleBtn('close-btn')" class="btn btn btn-ghost btn-lg text-gray-500 px-10 h-14 rounded-xl font-bold border-gray-300">Closed</button>
        </div>

        <!-- card section -->
         <section class="shadow-sm bg-white p-6 rounded-lg">
            <div class="flex items-center justify-between gap-6">
                
                <div class="flex items-center gap-6">
                    <div class="w-16 h-16 rounded-3xl bg-indigo-50 flex items-center justify-center">
                        <img src="assets/Aperture.png" alt="" class="w-8 h-8 object-contain">
                    </div>

                    <div>
                        <h2 class="text-2xl font-bold"><span id="issue-count">0</span> Issues</h2>
                        <p class="text-gray-500">Track and manage your project issues</p>
                    </div>
                </div>


                <div class="flex items-center gap-4 font-bold text-xs uppercase">
                    <div class="flex items-center gap-2 text-emerald-600 bg-emerald-50 px-4 py-2 rounded-full">
                        <img src="assets/Open-Status.png" alt="Open" class="w-4 h-4 object-contain">
                        <span>Open</span>
                    </div>

                    <div class="flex items-center gap-2 text-indigo-600 bg-indigo-50 px-4 py-2 rounded-full">
                        <img src="assets/Closed- Status .png" alt="Closed" class="w-4 h-4 object-contain">
                        <span>Closed</span>
                    </div>
                </div>

            </div>
            <hr class="text-gray-300 my-6">


            <!-- card -->
            <div id="issues-con" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 ">
                <div class="card p-4 shadow-2xl bg-white">
                    <!-- <div class="flex justify-between">
                        <img src="assets/Open-Status.png" alt="open">
                        <button class="btn text-red-500 rounded-full bg-[#FEECEC] px-[25px]">High</button>
                    </div>
                    <div class="my-3">
                        <h2>Fix navigation menu on mobile devices</h2>
                        <p class="line-clamp-2">The navigation menu doesn't collapse properly on mobile devices...</p>
                    </div>
                    <div class="gap-1 ">
                        <button class="btn text-red-500 bg-[#FEECEC]  rounded-full">Bug</button>
                        <button class="btn text-[#D97706] bg-[#FFF8DB] rounded-full">help wanted</button>
                    </div>
                    <hr class="text-gray-300 my-4">
                    <div class="">
                        <p>#1 by john_doe</p>
                        <p>1/15/2024</p>
                    </div> -->
                </div>
                <!-- loading spinner -->
                <div id="loadingSpinner" class=" hidden h-[60h] flex justify-center items-center">
                    <span class="loading loading-spinner loading-xl"></span>
                </div>
            </div>
         </section>

         <!-- modal part -->
            <dialog id="issue-modal" class="modal">
                <div class="modal-box w-11/12 max-w-3xl border-none shadow-3xl p-0 overflow-hidden rounded-xl bg-slate-300 shadow-lg">
                    <div id="modal-content" class="p-8">
                        <h2 id="issue-title" class="text-2xl font-bold text-gray-900 mb-4"></h2>
                        <div class="flex flex-wrap items-center gap-3 mb-4">
                            <span id="issue-status" class="badge bg-emerald-500 text-white border-none rounded-full px-4 py-2">Opened</span>
                            <span id="issue-opened-by-date" class="text-sm text-gray-500"></span>
                        </div>
                        <div id="issue-tags-container" class="flex flex-wrap gap-2 mb-4">
                            <span id="issue-tag-bug" class="badge bg-red-50 text-red-600 border border-red-200 rounded-full px-4 py-1 hidden">BUG</span>
                            <span id="issue-tag-help-wanted" class="badge bg-amber-50 text-amber-600 border border-amber-200 rounded-full px-4 py-1 hidden">HELP WANTED</span>
                            <span id="issue-tag-enhancement" class="badge bg-emerald-50 text-emerald-600 border border-emerald-200 rounded-full px-4 py-1 hidden">Enhancement</span>
                        </div>
                        <p id="issue-description" class="text-gray-600 mb-6 leading-relaxed"></p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <p class="text-sm text-gray-500 mb-1">Assignee</p>
                                <p id="issue-assignee" class="font-semibold text-gray-900"></p>
                            </div>
                            <div>
                                <p class="text-sm text-gray-500 mb-1">Priority</p>
                                <span id="issue-priority" class="badge bg-red-500 text-white border-none rounded-full px-4 py-2 font-bold">HIGH</span>
                            </div>
                        </div>
                    </div>
                    <div class="modal-action p-8 border-t border-gray-50 flex justify-end bg-gray-50/50">
                        <form method="dialog">
                            <button id="modal-close-button" class="btn bg-[#4A00FF] hover:bg-[#3d00cc] border-none text-white px-10 h-14 rounded-2xl font-bold transition-all duration-300">Close</button>
                        </form>
                    </div>
                </div>
                <form method="dialog" class="modal-backdrop">
                    <button>close</button>
                </form>
            </dialog>
         
     </main>
    <script src="home.js"></script>
</body>
</html>
