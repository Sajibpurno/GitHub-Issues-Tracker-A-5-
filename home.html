<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | GitHub Issues Tracker</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- navbar -->
    <header>
        <div class="navbar bg-white shadow-sm px-4 lg:px-20 border-b border-gray-100 sticky top-0 z-50 flex flex-col md:flex-row items-center md:items-center gap-3 md:gap-0">
            <!-- logo + title + mobile logout (right side) -->
            <div class="flex-1 w-full">
                <div class="flex items-center w-full justify-between md:justify-start gap-3">
                    <div class="flex items-center gap-3">
                        <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="Logo" class="w-10 h-10">
                        <a class="md:text-2xl text-[20px] font-bold tracking-tighter text-gray-800">GitHub Issues Tracker</a>
                    </div>
                    <!-- only mobile e right side logout icon -->
                    <button id="logOutMobile" onclick="logout()" class="flex md:hidden btn btn-ghost btn-circle border-2 border-gray-300 hover:border-red-500 text-gray-400 hover:text-red-500 transition-all duration-200">
                        <i class="fa-solid fa-arrow-right-from-bracket" style="color: #64748b;"></i>
                    </button>
                </div>
            </div>
            <!-- search + new issue + desktop logout -->
            <div class="w-full md:w-auto flex flex-col md:flex-row gap-3 md:gap-4 items-stretch md:items-center justify-center">
                <div class="flex w-full md:w-auto gap-2 md:gap-3 justify-center">
                    <input type="text" id="input-search" placeholder="Search issues..." class="input input-bordered w-full md:w-96 h-12 bg-gray-50 border-gray-200 focus:bg-white transition-all duration-200" />
                    <button id="btn-search" class="btn btn-primary px-4 md:px-6 bg-indigo-600 border-none hover:bg-indigo-700 text-white font-bold shadow-md rounded-lg whitespace-nowrap">+ New Issue</button>
                </div>
                <button id="logOut" onclick="logout()" class="hidden md:flex btn btn-ghost btn-circle border-2 border-gray-300 hover:border-red-500 text-gray-400 hover:text-red-500 transition-all duration-200">
                    <i class="fa-solid fa-arrow-right-from-bracket" style="color: #64748b;"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- main part -->
     <main class=" container mx-auto">
<!-- button part -->
        <div class="bg-white rounded-lg shadow-sm border border-gray-100 mb-4 w-full py-3 md:mt-15 mt-7 px-4 flex flex-row flex-wrap gap-2 justify-center md:justify-start lg:justify-start md:juss items-center">
            <button
                id="all-btn"
                onclick="toggleBtn('all-btn')"
                class="border-gray-300 btn btn-ghost btn-sm md:btn-md bg-[#4A00FF] text-gray-500 px-6 md:px-8 h-12 md:h-12 rounded-xl font-bold"
            >
                All
            </button>
            <button
                id="open-btn"
                onclick="toggleBtn('open-btn')"
                class="btn btn-ghost btn-sm md:btn-md text-gray-500 px-6 md:px-8 h-12 md:h-12 rounded-xl font-bold border-gray-300"
            >
                Open
            </button>
            <button
                id="close-btn"
                onclick="toggleBtn('close-btn')"
                class="btn btn-ghost btn-sm md:btn-md text-gray-500 px-6 md:px-8 h-12 md:h-12 rounded-xl font-bold border-gray-300"
            >
                Closed
            </button>
        </div>

        <!-- card section -->
         <section class="shadow-sm bg-white p-6 rounded-lg">
            <div class="flex items-center justify-between gap-6">
                
                <div class="flex items-center gap-6">
                    <div class="md:w-16 md:h-16 w-20 h-8 rounded-3xl bg-indigo-50 flex items-center justify-center">
                        <img src="assets/Aperture.png" alt="" class="md:w-8 md:h-8 w-6 h-6 object-contain">
                    </div>

                    <div>
                        <h2 class="text-2xl font-bold"><span id="issue-count">0</span> Issues</h2>
                        <p class="text-gray-500">Track and manage your project issues</p>
                    </div>
                </div>


                <div class="flex items-center gap-1 font-bold text-xs uppercase">
                    <div class="flex items-center text-emerald-600 bg-emerald-50 px-4 py-2 rounded-full">
                        <img src="assets/Open-Status.png" alt="Open" class="w-4 h-4 object-contain">
                        <span class="md:pr-0 pr-4">Open</span>
                    </div>

                    <div class="flex items-center text-indigo-600 bg-indigo-50 px-2 py-2 rounded-full">
                        <img src="assets/Closed- Status .png" alt="Closed" class="w-4 h-4 object-contain">
                        <span class="md:pr-0 pr-3">Closed</span>
                    </div>
                </div>

            </div>
            <hr class="text-gray-300 my-6">


            <!-- loading spinner -->
            <div id="loadingSpinner" class="hidden w-full py-10 flex justify-center items-center">
                <span class="loading loading-spinner loading-xl"></span>
            </div>
            <!-- card container -->
            <div id="issues-con" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 "></div>
         </section>

         <!-- modal part -->
            <dialog id="issue-modal" class="modal">
                <div class="modal-box w-11/12 max-w-3xl border-none shadow-3xl p-0 overflow-hidden rounded-xl bg-slate-300 shadow-lg">
                    <div id="modal-content" class="p-8">
                        <h2 id="issue-title" class="text-2xl font-bold text-gray-900 mb-4"></h2>
                        <div class="flex flex-wrap items-center gap-3 mb-4">
                            <span id="issue-status" class="badge bg-emerald-500 text-white border-none rounded-full px-4 py-2">Opened</span>
                            <span id="issue-opened-by-date" class="text-sm text-gray-500"></span>
                        </div>
                        <div id="issue-tags-container" class="flex flex-wrap gap-2 mb-4">
                            <span id="issue-tag-bug" class="badge bg-red-50 text-red-600 border border-red-200 rounded-full px-4 py-1 hidden">BUG</span>
                            <span id="issue-tag-help-wanted" class="badge bg-amber-50 text-amber-600 border border-amber-200 rounded-full px-4 py-1 hidden">HELP WANTED</span>
                            <span id="issue-tag-enhancement" class="badge bg-emerald-50 text-emerald-600 border border-emerald-200 rounded-full px-4 py-1 hidden">Enhancement</span>
                        </div>
                        <p id="issue-description" class="text-gray-600 mb-6 leading-relaxed"></p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <p class="text-sm text-gray-500 mb-1">Assignee</p>
                                <p id="issue-assignee" class="font-semibold text-gray-900"></p>
                            </div>
                            <div>
                                <p class="text-sm text-gray-500 mb-1">Priority</p>
                                <span id="issue-priority" class="badge bg-red-500 text-white border-none rounded-full px-4 py-2 font-bold">HIGH</span>
                            </div>
                        </div>
                    </div>
                    <div class="modal-action p-8 border-t border-gray-50 flex justify-end bg-gray-50/50">
                        <form method="dialog">
                            <button id="modal-close-button" class="btn bg-[#4A00FF] hover:bg-[#3d00cc] border-none text-white px-10 h-14 rounded-2xl font-bold transition-all duration-300">Close</button>
                        </form>
                    </div>
                </div>
                <form method="dialog" class="modal-backdrop">
                    <button>close</button>
                </form>
            </dialog>
         
     </main>
    <script src="home.js"></script>
</body>
</html>
